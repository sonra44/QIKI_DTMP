# Docker Compose Phase 1: Базовая среда для разработки
# Устанавливает NATS и окружение для разработки/тестирования
# Версия: 1.0, Дата: 2025-09-02 (воссоздание)

services:
  # NATS Message Broker - ядро для FastStream
  nats:
    build:
      context: .
      dockerfile: Dockerfile.nats
    container_name: qiki-nats-phase1
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    command:
      - "--jetstream"
      - "--http_port"
      - "8222"
      - "--auth"
      - "${NATS_TOKEN:?M2 auth: задай NATS_TOKEN в .env}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - nats-data-phase1:/data
    networks:
      - qiki-network-phase1
    tty: true

  # Окружение для разработки
  qiki-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: qiki-dev-phase1
    volumes:
      - ./src:/workspace/src
      - ./generated:/workspace/generated
      - ./config:/workspace/config
      - ./tests:/workspace/tests
      - ./scripts:/workspace/scripts
      - ./tools:/workspace/tools
      - ./proto:/workspace/proto
      - ./protos:/workspace/protos
      - ./proto_extensions:/workspace/proto_extensions
      - ./pytest.ini:/workspace/pytest.ini:ro
      - ./ruff.toml:/workspace/ruff.toml:ro
      - ./mypy.ini:/workspace/mypy.ini:ro
      - ./requirements.txt:/workspace/requirements.txt:ro
      - ./requirements-dev.txt:/workspace/requirements-dev.txt:ro
      - ./requirements-faststream.txt:/workspace/requirements-faststream.txt:ro
      - pip-cache-phase1:/root/.cache/pip
    working_dir: /workspace
    networks:
      - qiki-network-phase1
    depends_on:
      nats:
        condition: service_healthy
      nats-js-init:
        condition: service_completed_successfully
      q-sim-service:
        condition: service_healthy
      q-core-intents:
        condition: service_started
      faststream-bridge:
        condition: service_started
    tty: true
    stdin_open: true
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONPATH=/workspace/src:/workspace:/workspace/generated
      - BIOS_URL=http://q-bios-service:8080
      - NATS_URL=nats://nats:4222
      - NATS_TOKEN=${NATS_TOKEN:-}
    command: bash -lc "bash tools/ensure_generated.sh && python -m qiki.services.q_core_agent.main --grpc"
    restart: on-failure

  q-sim-service:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: qiki-sim-phase1
    volumes:
      - ./src:/workspace/src
      - ./generated:/workspace/generated
      - ./config:/workspace/config
      - ./tests:/workspace/tests
      - ./scripts:/workspace/scripts
      - ./tools:/workspace/tools
      - ./proto:/workspace/proto
      - ./protos:/workspace/protos
      - ./proto_extensions:/workspace/proto_extensions
      - ./pytest.ini:/workspace/pytest.ini:ro
      - ./ruff.toml:/workspace/ruff.toml:ro
      - ./mypy.ini:/workspace/mypy.ini:ro
      - ./requirements.txt:/workspace/requirements.txt:ro
      - ./requirements-dev.txt:/workspace/requirements-dev.txt:ro
      - ./requirements-faststream.txt:/workspace/requirements-faststream.txt:ro
      - pip-cache-phase1:/root/.cache/pip
    working_dir: /workspace
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc,sys; from generated.q_sim_api_pb2_grpc import QSimAPIServiceStub; from generated.q_sim_api_pb2 import HealthCheckRequest; ch=grpc.insecure_channel('localhost:50051'); stub=QSimAPIServiceStub(ch); stub.HealthCheck(HealthCheckRequest(), timeout=2.0)"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - qiki-network-phase1
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONPATH=/workspace/src:/workspace:/workspace/generated
      - BOT_CONFIG_PATH=${BOT_CONFIG_PATH:-/workspace/src/qiki/services/q_core_agent/config/bot_config.json}
      - RADAR_ENABLED=1
      - RADAR_NATS_ENABLED=1
      - RADAR_SR_THRESHOLD_M=${RADAR_SR_THRESHOLD_M:-5000.0}
      - TELEMETRY_NATS_ENABLED=1
      - TELEMETRY_INTERVAL_SEC=1.0
      - NATS_URL=nats://nats:4222
      - NATS_TOKEN=${NATS_TOKEN:-}
    command: bash -lc "bash tools/ensure_generated.sh && python -m qiki.services.q_sim_service.grpc_server"
    tty: true
    stdin_open: true
    depends_on:
      nats:
        condition: service_healthy

  q-bios-service:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: qiki-bios-phase1
    volumes:
      - ./src:/workspace/src
      - ./generated:/workspace/generated
      - ./config:/workspace/config
      - ./tests:/workspace/tests
      - ./scripts:/workspace/scripts
      - ./tools:/workspace/tools
      - ./proto:/workspace/proto
      - ./protos:/workspace/protos
      - ./proto_extensions:/workspace/proto_extensions
      - ./pytest.ini:/workspace/pytest.ini:ro
      - ./ruff.toml:/workspace/ruff.toml:ro
      - ./mypy.ini:/workspace/mypy.ini:ro
      - ./requirements.txt:/workspace/requirements.txt:ro
      - ./requirements-dev.txt:/workspace/requirements-dev.txt:ro
      - ./requirements-faststream.txt:/workspace/requirements-faststream.txt:ro
      - pip-cache-phase1:/root/.cache/pip
    working_dir: /workspace
    networks:
      - qiki-network-phase1
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/workspace/src:/workspace:/workspace/generated
      - LOG_LEVEL=INFO
      - BIOS_LISTEN_HOST=0.0.0.0
      - BIOS_LISTEN_PORT=8080
      - BOT_CONFIG_PATH=${BOT_CONFIG_PATH:-/workspace/src/qiki/services/q_core_agent/config/bot_config.json}
      - SIM_GRPC_HOST=q-sim-service
      - SIM_GRPC_PORT=50051
      - SIM_HEALTH_CHECK_TIMEOUT=2.0
      - NATS_URL=nats://nats:4222
      - NATS_TOKEN=${NATS_TOKEN:-}
      # Canonical v1 BIOS status subject; changing it is non-canonical/dev wiring only.
      - NATS_EVENT_SUBJECT=qiki.events.v1.bios_status
      - BIOS_PUBLISH_ENABLED=1
      - BIOS_PUBLISH_INTERVAL_SEC=5.0
    command: python -m qiki.services.q_bios_service.main
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      nats:
        condition: service_healthy
      nats-js-init:
        condition: service_completed_successfully
      q-sim-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  faststream-bridge:
    build:
      context: .
      dockerfile: src/qiki/services/faststream_bridge/Dockerfile
    container_name: qiki-faststream-bridge-phase1
    networks:
      - qiki-network-phase1
    depends_on:
      nats:
        condition: service_healthy
      nats-js-init:
        condition: service_completed_successfully
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_TOKEN=${NATS_TOKEN:-}
      - RADAR_GUARD_EVENTS_ENABLED=${RADAR_GUARD_EVENTS_ENABLED:-0}
      - QIKI_INTENTS_SUBJECT=qiki.intents.faststream_disabled
    restart: on-failure

  q-core-intents:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: qiki-qcore-intents-phase1
    volumes:
      - ./src:/workspace/src
      - ./generated:/workspace/generated
      - ./config:/workspace/config
      - ./tests:/workspace/tests
      - ./scripts:/workspace/scripts
      - ./tools:/workspace/tools
      - ./proto:/workspace/proto
      - ./protos:/workspace/protos
      - ./proto_extensions:/workspace/proto_extensions
      - ./pytest.ini:/workspace/pytest.ini:ro
      - ./ruff.toml:/workspace/ruff.toml:ro
      - ./mypy.ini:/workspace/mypy.ini:ro
      - ./requirements.txt:/workspace/requirements.txt:ro
      - ./requirements-dev.txt:/workspace/requirements-dev.txt:ro
      - ./requirements-faststream.txt:/workspace/requirements-faststream.txt:ro
      - pip-cache-phase1:/root/.cache/pip
    working_dir: /workspace
    networks:
      - qiki-network-phase1
    depends_on:
      nats:
        condition: service_healthy
      q-sim-service:
        condition: service_healthy
      q-bios-service:
        condition: service_healthy
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/workspace/src:/workspace:/workspace/generated
      - NATS_URL=nats://nats:4222
      - NATS_TOKEN=${NATS_TOKEN:-}
      - QIKI_INTENTS_SUBJECT=qiki.intents
      - QIKI_RESPONSES_SUBJECT=qiki.responses.qiki
      # Волна 0 Ф1: intents не владеет FSM-правдой; без сидированного fsm_state
      # refresh мира абортится ДО ingest сенсоров -> world_snapshot (радар) пуст
      # навсегда. Fallback ЯВНО помечен (is_fallback, warning в лог).
      - QIKI_ALLOW_INTERFACE_FALLBACK=true
      - OPENAI_MODEL=${OPENAI_MODEL:-openai/gpt-5.2}
      # M3: LLM-трафик q-core заворачивается через gateway. Реальный ключ здесь
      # НЕ живёт — только виртуальный; base_url указывает на gateway.
      - OPENAI_BASE_URL=http://qiki-gateway:8090/v1
      - OPENAI_API_KEY=${QIKI_GATEWAY_VKEY_QCORE:-}
    command: bash -lc "bash tools/ensure_generated.sh && python -m qiki.services.q_core_agent.qiki_orion_intents_service"

  # M3: QIKI Gateway — единственное место, где живёт РЕАЛЬНЫЙ ключ провайдера.
  qiki-gateway:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: qiki-gateway-phase1
    volumes:
      - ./src:/workspace/src
      - ./tools:/workspace/tools
      - ./requirements.txt:/workspace/requirements.txt:ro
      - pip-cache-phase1:/root/.cache/pip
    working_dir: /workspace
    networks:
      - qiki-network-phase1
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/workspace/src:/workspace:/workspace/generated
      - QIKI_GATEWAY_HOST=0.0.0.0
      - QIKI_GATEWAY_PORT=8090
      - QIKI_GATEWAY_MODE=${QIKI_GATEWAY_MODE:-audit}
      - QIKI_GATEWAY_VKEYS=${QIKI_GATEWAY_VKEY_QCORE:-}
      # Реальный ключ провайдера — ТОЛЬКО тут, из .env:
      - OPENAI_API_KEY=${OPENAI_API_KEY_REAL:-}
      - OPENAI_BASE_URL=${OPENAI_UPSTREAM_URL:-https://api.openai.com/v1}
    command: python -m qiki.services.qiki_gateway.main
    restart: on-failure

  # Registrar service for event auditing
  registrar:
    build:
      context: .
      dockerfile: src/qiki/services/registrar/Dockerfile
    container_name: qiki-registrar-phase1
    networks:
      - qiki-network-phase1
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - registrar-data-phase1:/var/log/qiki
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONPATH=/app/src
      - NATS_URL=nats://nats:4222
      - NATS_TOKEN=${NATS_TOKEN:-}
    restart: on-failure

  # Инициализация JetStream Stream для радарных топиков
  nats-js-init:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: qiki-nats-js-init
    networks:
      - qiki-network-phase1
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONPATH=/workspace/src:/workspace:/workspace/generated
      - NATS_URL=nats://nats:4222
      - NATS_TOKEN=${NATS_TOKEN:-}
      - RADAR_STREAM=QIKI_RADAR_V1
      - RADAR_SUBJECTS=qiki.radar.v1.*
      - RADAR_DUPLICATE_WINDOW_SEC=120
      - RADAR_MAX_BYTES=10485760
      - RADAR_MAX_AGE_SEC=3600
      - RADAR_CONSUMER_ACK_WAIT_SEC=45
      - RADAR_CONSUMER_MAX_DELIVER=7
      - RADAR_CONSUMER_MAX_ACK_PENDING=512
      - RADAR_FRAMES_DURABLE=radar_frames_pull
      - RADAR_TRACKS_DURABLE=radar_tracks_pull
      - EVENTS_ENABLED=1
      - EVENTS_STREAM=QIKI_EVENTS_V1
      - EVENTS_SUBJECTS=qiki.events.v1.>
      - EVENTS_DUPLICATE_WINDOW_SEC=120
      - EVENTS_MAX_BYTES=10485760
      - EVENTS_MAX_AGE_SEC=3600
      - EVENTS_CONSUMER_ACK_WAIT_SEC=45
      - EVENTS_CONSUMER_MAX_DELIVER=7
      - EVENTS_CONSUMER_MAX_ACK_PENDING=512
      - EVENTS_AUDIT_SUBJECT=qiki.events.v1.audit
      - EVENTS_AUDIT_DURABLE=events_audit_pull
    command: python tools/js_init.py
    restart: "no"

networks:
  qiki-network-phase1:
    driver: bridge

volumes:
  nats-data-phase1:
  pip-cache-phase1:
  registrar-data-phase1:
