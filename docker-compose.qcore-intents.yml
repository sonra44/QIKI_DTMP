services:
  # Q-Core intent handler (ORION QIKI protocol) - proposals-only.
  # Run together with phase1 compose:
  #   docker compose -f docker-compose.phase1.yml -f docker-compose.qcore-intents.yml up -d --build
  q-core-intents:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: qiki-qcore-intents-phase1
    volumes:
      - ./src:/workspace/src
      - ./generated:/workspace/generated
      - ./config:/workspace/config
      - ./tests:/workspace/tests
      - ./scripts:/workspace/scripts
      - ./tools:/workspace/tools
      - ./proto:/workspace/proto
      - ./protos:/workspace/protos
      - ./proto_extensions:/workspace/proto_extensions
      - ./pytest.ini:/workspace/pytest.ini:ro
      - ./ruff.toml:/workspace/ruff.toml:ro
      - ./mypy.ini:/workspace/mypy.ini:ro
      - ./requirements.txt:/workspace/requirements.txt:ro
      - ./requirements-dev.txt:/workspace/requirements-dev.txt:ro
      - ./requirements-faststream.txt:/workspace/requirements-faststream.txt:ro
      - pip-cache-phase1:/root/.cache/pip
    working_dir: /workspace
    networks:
      - qiki-network-phase1
    depends_on:
      nats:
        condition: service_healthy
      q-sim-service:
        condition: service_healthy
      q-bios-service:
        condition: service_healthy
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/workspace/src:/workspace:/workspace/generated
      - NATS_URL=nats://nats:4222
      - NATS_TOKEN=${NATS_TOKEN:-}
      - QIKI_INTENTS_SUBJECT=qiki.intents
      - QIKI_RESPONSES_SUBJECT=qiki.responses.qiki
      # Optional OpenAI config (disabled unless OPENAI_API_KEY is set)
      - OPENAI_MODEL=openai/gpt-5.2
    command: bash -lc "bash tools/ensure_generated.sh && python -m qiki.services.q_core_agent.qiki_orion_intents_service"
    restart: on-failure

  # Disable QIKI intent handling in faststream-bridge to avoid double replies.
  faststream-bridge:
    environment:
      - QIKI_INTENTS_SUBJECT=qiki.intents.faststream_disabled
